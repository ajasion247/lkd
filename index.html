<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form>

        <label>Full Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required placeholder="Enter your password"><br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="date" required placeholder="Enter your date of birth"><br><br>

        <label>Age:</label><br>
        <input type="number" name="age" required placeholder="Enter your age"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone" required><br><br>

        <label>Subjects:</label><br>
        <input type="radio" name="subjects" value="Math"> Math<br>
        <input type="radio" name="subjects" value="Science"> Science<br>
        <input type="radio" name="subjects" value="History"> History<br>
        <input type="radio" name="subjects" value="Literature"> Literature
        <br><br>
        <select name="subjects" required>
            <option value="Math">Math</option><br>
            <option value="Science">Science</option><br
           
        </select>

        <input type="submit" value="Submit">

    </form>

</body>
</html>
